      Eval baseline held/improved: hibrido recall@5 1.00 unchanged, MRR
      0.920 -> 0.943; lexico unchanged at 0.95/0.857. npm run typecheck
      exit 0, npm run build exit 0, npm test 159/159 (155 baseline + 4
