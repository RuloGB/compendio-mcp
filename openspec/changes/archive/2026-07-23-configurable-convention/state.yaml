      etiquetas/estado still work), D1.2 (goldenset.yaml's 22 esperado
      paths rewritten, zero pregunta text changed), D1.3
      (test/fixtures/estricto/ synthetic fixture: 5 docs reproducing the
      retired tipos/estados taxonomy, verified via vitest and the real
