next_recommended: [] # cycle complete; nothing pending for this change
residual_decisions: # confirmed by the user 2026-07-22, proposal question round
  estados_excluidos_placement: >-
    Moves into the convencion block; search.estadosExcluidos is retired.
  overview_empty_taxonomy: >-
    docs_overview omits porTipo/porModulo buckets entirely when the corpus has
    no such values; no synthetic "sin tipo" bucket.
  index_md_ordering: >-
    Alphabetical by ruta in libre mode; declared-taxonomy order in estricto.
    User note: the MCP is not in production yet (no installed base), so the
    re-sort of existing INDEX.md files and contract breaks carry no real cost.
  estricto_without_taxonomies: >-
    Presence-only validation: fields must exist and be non-empty, any value
    accepted; declaring tipos/estados additionally enforces values.
product_decisions: # confirmed by the user 2026-07-22, pre-proposal question round
  strictness: >-
    Explicit toggle convencion.modo: "estricto" | "libre". No config -> libre
    (inference, never skips files). estricto -> linter behavior validating
    against user-declared taxonomies, invalid files skipped (omitidos).
  modulo_inference: >-
    First folder segment under docsDir (docs/auth/login.md -> modulo "auth");
    files at docsDir root have no modulo. Frontmatter/mapping wins when present.
  estado_semantics: >-
    Config-driven: estadosExcluidos declared per project; when not declared,
    nothing is excluded and incluir_no_vigentes is a no-op. Current behavior is
    reproducible by declaring ["borrador","obsoleto"].
  fixtures: >-
    Rework ejemplos/ as the zero-config corpus (primary example, matching the
    product pitch); the full-convention case moves to secondary synthetic
    fixtures. Implies restructuring ejemplos/ folders (currently tipo-based)
    and updating goldenset.yaml rutas.
