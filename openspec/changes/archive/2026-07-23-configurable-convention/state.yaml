schema: spec-driven
change: configurable-convention
created: 2026-07-22
artifact_store: openspec
execution_mode: interactive
delivery_strategy: ask-on-risk
phases:
  explore:
    status: done
    artifact: exploration.md
    completed: 2026-07-22
    note: >-
      Investigation by sdd-explore agent; artifact persisted by the
      orchestrator because the explore agent has no write tooling.
  proposal:
    status: done
    artifact: proposal.md
    completed: 2026-07-22
  specs:
    status: done
    completed: 2026-07-22
    artifacts:
      - specs/configuration/spec.md
      - specs/indexing/spec.md
      - specs/search/spec.md
      - specs/mcp-contract/spec.md
      - specs/index-md/spec.md
    assumptions_flagged: # extrapolated by sdd-spec, to confirm during design/tasks review
      - estricto INDEX.md ordering tie-break within a tipo group = alphabetical by ruta
      - docs_overview partial taxonomy coverage counts only defined values (no synthetic bucket)
      - all requirements are ADDED (no baseline in openspec/specs/ to MODIFY against; first SDD change)
  design:
    status: done
    completed: 2026-07-23
    artifact: design.md
    core: >-
      Injected pure-domain ConvencionPolicy (libre inference-first default vs
      estricto linter vs declared taxonomies); tipo/modulo/estado optional open
      strings; estado filtering becomes a NULL-aware deny-list; policy built
      from config in the composition root.
    confirmed_assumptions: # user-confirmed 2026-07-23, now binding
      - estricto performs no inference (validation-only)
      - retired search.estadosExcluidos key -> warn-and-ignore
      - estricto INDEX.md intra-tipo tie-break -> alphabetical by ruta
      - docs_overview partial taxonomy -> count only defined values
    review:
      protocol: judgment-day (blind dual adversarial review)
      rounds: 4
      fix_iterations: 4
      outcome: >-
        APPROVED (closed 2026-07-23 by user decision after round 4 returned
        zero confirmed CRITICALs; iteration-4 fixes verified textually by the
        orchestrator instead of a fifth blind round — explicit user choice).
      highlights: >-
        Caught pre-implementation: false schema-migration claim (reset() never
        recreated tables), a fix-introduced data-wipe regression (drop-and-
        recreate in the constructor path), incomplete type-ripple enumeration,
        and estricto-semantics divergences between spec and design.
    additional_decisions: # user-confirmed 2026-07-23 during judgment-day
      concurrency_non_goal: >-
        Concurrent readers during a compendio index run are out of scope /
        best-effort: a live serve session MAY see empty results or a transient
        error while reset()'s transactional drop-and-recreate is in flight.
        Declared as a spec-level non-goal (indexing spec).
      overview_ordering: >-
        docs_overview per-document lines (listDocuments) ordered alphabetically
        by ruta (was ORDER BY tipo, which would NULL-cluster in zero-config
        corpora) — coherence extension of the INDEX.md ordering decision.
    reconciliation_note: >-
      Design was authored in parallel with spec (no spec.md existed at design
      time); inference details (humanized filename, ordering comparator) must
      be reconciled spec<->design before or during tasks.
  tasks:
    status: done
    completed: 2026-07-23
    artifact: tasks.md
    decisions: # made during sdd-tasks
      slice_b_size_exception: >-
        Slice B (domain model + validation-gate + resilience + SQLite + search
        + overview + read-doc + composition) ships as a single size:exception
        PR — the optional-field TS ripple across ~9 files cannot be split
        without a transient red build (per design.md Open Questions).
      slice_d_split: >-
        Slice D splits into D1 (fixtures/corpus: ejemplos/ migration,
        goldenset.yaml, secondary estricto fixture) and D2 (docs: README,
        convencion-documentacion.md, CLAUDE.md, INDEX.md regen) as two
        independently reviewable PRs to balance the B exception.
      reconciliation_resolution: >-
        Closed state.yaml's spec<->design reconciliation flag: on detailed
        comparison, spec.md and design.md do not actually diverge on the
        humanized-filename algorithm or the INDEX.md ordering comparator
        (estricto declared-order-then-alphabetical-by-ruta tie-break) — both
        describe the same behavior; design.md was less explicit about the
        tie-break, not contradictory. Recorded as task 0.1 in tasks.md, to be
        appended to design.md's Open Questions during apply.
  apply:
    status: done
    artifact: apply-progress.md
    completed_slice: >-
      Phase 0 (task 0.1) + Phase A (A1, A2, A4 full; A3 closed by B20) +
      Phase B (B1-B21, fully closed) + Phase C (C1, C2, C3, fully closed) +
      Phase D1 (D1.1-D1.5, fully closed) + Phase D2 (D2.1-D2.4, fully closed) +
      Phase E (E1, E2, fully closed) -- the entire change is complete
    remaining_phases: []
    note: >-
      Batch 1: Phase A additive/green; A3's search.estadosExcluidos removal
      deferred to B20 (composition.ts structural dependency). Batch 2: Phase
      B (B1-B20) landed as the pre-approved size:exception PR, closing A3's
      deferred debt in full. B21 was left PARTIAL because the only residual
      failure (npm run typecheck/build red) lived exclusively in Phase C's
      own files (server.ts/cli.ts still importing Tipo/TIPOS, which B1
      deletes from model.ts), and Batch 2's explicit scope forbade touching
      Phase C. Batch 3: implemented C1 (server.ts's search_docs tipo param
      -> z.string().optional(), TIPOS import dropped), C2 (cli.ts's
      parseTipo -> plain trimmed passthrough, no more process.exit(2); help
      text for --tipo/--todos updated to describe open-string/config-driven
      behavior; added an entry-point guard around program.parseAsync so
      cli.ts is safely importable by tests), and C3 (test/server.test.ts:
      3 tests on the MCP tool's zod schema directly via _registeredTools;
      test/cli.test.ts: 4 tests on the exported parseTipo). This closes
      B21 as a direct consequence: npm run typecheck exit 0, npm run build
      exit 0, npm test 155/155 (148 baseline + 7 new), and
      `grep -rn "TIPOS|ESTADOS|\bTipo\b|\bEstado\b" src/` returns zero
      matches. Batch 4: implemented D1.1 (ejemplos/docs/ restructured via
      git mv into folder-as-module layout: leadsviewer/, informes/,
      transversal/, glosario.md at root; frontmatter stripped to nothing on
