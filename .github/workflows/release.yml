name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # The job never pushes via git (gh brings its own token below); do not
          # leave the GITHUB_TOKEN in .git/config where the dependency install
          # scripts run by `npm ci` could read it.
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      # Publishing to npm is done manually (the account enforces 2FA on writes,
      # which no unattended runner can satisfy). This job only validates the
      # tagged commit and cuts the GitHub Release; run `npm publish` locally.
      #
      # The same checks that `prepublishOnly` runs are listed as explicit steps
      # so a failure is visible per phase in the run summary.
      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
